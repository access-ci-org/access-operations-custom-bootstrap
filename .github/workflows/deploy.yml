name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile
        run: npm run build:css

      - name: Gather Documentation Bundle
        run: ./deploy-docs.sh

      - name: Deploy public Folder to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public # Ships only the clean public directory to the public documentation
          branch: gh-pages